name: Racing Monitor Bot

on:
  schedule:
    - cron: '*/15 * * * *'  # 每 15 分鐘執行一次
  workflow_dispatch:      # 允許你手動點擊執行測試

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Run Racing Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python Race.py

      - name: Commit and Push last_odds.json
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "action@github.com"
          git add last_odds.json || exit 0
          git commit -m "Update last odds data" || exit 0
          git push
