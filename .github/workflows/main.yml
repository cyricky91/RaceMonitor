name: Racing Monitor Bot

on:
  schedule:
    - cron: '*/15 * * * *'  # 每 15 分鐘運行一次
  workflow_dispatch:      # 允許手動點擊按鈕執行

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # 必須開啟寫入權限，否則無法儲存 JSON

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Update Entries Database
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python Get_Entries.py

      - name: Run Racing Monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python Race.py

      - name: Commit and Push Data Changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "action@github.com"
          
          # 強制添加生成的 JSON 檔案，若不存在則跳過
          git add today_entries.json last_odds.json || true
          
          # 檢查是否有變動，避免 nothing to commit 錯誤
          if git diff --staged --quiet; then
            echo "今日數據無變動，跳過提交。"
          else
            git commit -m "Auto-update racing data [skip ci]"
            git push
          fi
